<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IT Helpdesk Ticket System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="header">
      <h2>IT helpdesk ticket system</h2>
      <span class="subtitle">Municipal Infrastructure Support</span>
    </div>

    <div class="stats" id="stats"></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('tickets')">All tickets</button>
      <button class="tab" onclick="switchTab('new')">New ticket</button>
    </div>

    <div id="tab-tickets">
      <div class="controls">
        <input type="text" id="search" placeholder="Search tickets..." oninput="renderTickets()" />
        <select id="filter-status" onchange="renderTickets()">
          <option value="">All statuses</option>
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Resolved">Resolved</option>
        </select>
        <select id="filter-priority" onchange="renderTickets()">
          <option value="">All priorities</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
      <div class="ticket-list" id="ticket-list"></div>
    </div>

    <div id="tab-new" style="display:none;">
      <div class="form-card">
        <h3>Submit a new ticket</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Your name</label>
            <input type="text" id="f-name" placeholder="e.g. John Dlamini" />
          </div>
          <div class="form-group">
            <label>Department</label>
            <input type="text" id="f-dept" placeholder="e.g. Finance" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Issue category</label>
            <select id="f-cat">
              <option>Network connectivity</option>
              <option>Hardware failure</option>
              <option>Software error</option>
              <option>Account / access</option>
              <option>Email issue</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select id="f-priority">
              <option>Low</option>
              <option selected>Medium</option>
              <option>High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Issue description</label>
          <textarea id="f-desc" placeholder="Describe the issue in detail..."></textarea>
        </div>
        <button class="submit-btn" onclick="submitTicket()">Submit ticket</button>
        <div class="success-msg" id="success-msg">Ticket submitted successfully!</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
